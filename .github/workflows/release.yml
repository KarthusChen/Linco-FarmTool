name: Release

# 推送形如 v1.0.0 的 tag 时，自动打包并发布到 GitHub Releases
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # tag v1.2.3 -> 版本号 1.2.3，写进 exe，保证与 Release 一致（避免更新死循环）
      - name: 提取版本号
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: 打包单文件 exe
        run: >
          dotnet publish src/LincoFarmTool/LincoFarmTool.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=none
          -p:Version=${{ steps.ver.outputs.version }}
          -p:AssemblyVersion=${{ steps.ver.outputs.version }}
          -p:FileVersion=${{ steps.ver.outputs.version }}
          -o dist

      - name: 发布到 Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LincoFarmTool.exe
          generate_release_notes: true
